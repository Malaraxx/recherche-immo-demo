<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boussole — Recherche immobilière conversationnelle</title>
<meta name="description" content="Décrivez le bien que vous cherchez, les résultats arrivent immédiatement. Prototype de démonstration, annonces fictives (métropole lilloise).">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     1. Système de design — papier chaud, encre aubergine,
        accent terracotta. Mobile-first.
     ========================================================= */
  :root{
    --paper:#FAF6EF;
    --card:#FFFFFF;
    --ink:#28203A;
    --ink-soft:#6E6683;
    --line:#E9E1D4;
    --terra:#C4552D;
    --terra-soft:#F7E6DC;
    --terra-deep:#9E3F1D;
    --plum:#4A3A6B;
    --ok-bg:#EFEAF9;
    --radius:16px;
    --font-d:'Fraunces',Georgia,serif;
    --font-t:'Outfit',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--font-t);background:var(--paper);color:var(--ink);
    line-height:1.55;-webkit-font-smoothing:antialiased;
  }
  [hidden]{display:none!important}
  button{font:inherit;cursor:pointer}
  ::placeholder{color:var(--ink-soft);opacity:.7}

  /* =========================================================
     2. Écran d'accueil — un champ, une accroche, 3 suggestions
     ========================================================= */
  #home{position:relative;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
  .brand{font-family:var(--font-d);font-weight:600;font-size:1.3rem;letter-spacing:.01em}
  .brand i{font-style:normal;color:var(--terra)}
  #home .brand{margin-bottom:34px}
  #home h1{
    font-family:var(--font-d);font-weight:500;font-size:clamp(1.7rem,5.5vw,2.7rem);
    letter-spacing:-.01em;line-height:1.2;max-width:620px;margin-bottom:26px;
  }
  #home h1 em{font-style:italic;color:var(--terra)}
  .ask{display:flex;gap:8px;width:100%;max-width:640px;background:var(--card);border:1.5px solid var(--line);border-radius:99px;padding:7px 7px 7px 22px;transition:border-color .2s,box-shadow .2s}
  .ask:focus-within{border-color:var(--terra);box-shadow:0 4px 24px rgba(196,85,45,.12)}
  .ask input{flex:1;min-width:0;border:none;background:none;font:inherit;font-size:.98rem;color:var(--ink);outline:none}
  .ask button{
    border:none;border-radius:99px;background:var(--ink);color:var(--paper);
    padding:11px 20px;font-weight:600;font-size:.9rem;white-space:nowrap;transition:background .2s;
  }
  .ask button:hover{background:var(--terra-deep)}
  .hints{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:20px;max-width:640px}
  .hints button{
    border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
    border-radius:99px;padding:8px 14px;font-size:.82rem;transition:border-color .2s,color .2s;
  }
  .hints button:hover{border-color:var(--terra);color:var(--terra-deep)}

  /* =========================================================
     3. Vue scindée — résultats (plein écran mobile) +
        conversation (tiroir bas mobile / colonne gauche desktop)
     ========================================================= */
  #app{min-height:100svh}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line)}
  .topbar .tag{font-size:.68rem;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-soft)}

  #results{padding:16px 18px 170px} /* marge basse = place du tiroir mobile */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .chip{
    display:inline-flex;align-items:center;gap:7px;background:var(--terra-soft);color:var(--terra-deep);
    border:1px solid rgba(196,85,45,.25);border-radius:99px;padding:5px 7px 5px 13px;
    font-size:.8rem;font-weight:600;animation:pop .18s ease;
  }
  @keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .chip button{
    border:none;background:rgba(196,85,45,.14);color:inherit;border-radius:99px;
    width:19px;height:19px;line-height:1;font-size:.78rem;display:flex;align-items:center;justify-content:center;
  }
  .chip button:hover{background:var(--terra);color:#fff}
  .count{font-size:.85rem;color:var(--ink-soft);margin-bottom:14px}
  .count b{color:var(--ink);font-weight:700}

  .cards{display:grid;grid-template-columns:1fr;gap:14px}
  @media(min-width:640px){.cards{grid-template-columns:1fr 1fr}}
  @media(min-width:1280px){.cards{grid-template-columns:1fr 1fr 1fr}}

  .bcard{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;animation:rise .3s ease both;
  }
  @keyframes rise{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
  .visual{
    height:110px;display:flex;align-items:flex-end;padding:12px 16px;
    color:rgba(255,255,255,.94);font-family:var(--font-d);font-style:italic;font-size:1rem;
  }
  .visual small{font-style:normal;font-family:var(--font-t);font-size:.72rem;opacity:.85;display:block}
  .bbody{padding:14px 16px 16px}
  .bhead{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:2px}
  .btitle{font-weight:600;font-size:.92rem}
  .bprice{font-family:var(--font-d);font-weight:600;font-size:1.08rem;white-space:nowrap;font-variant-numeric:tabular-nums}
  .bmeta{font-size:.78rem;color:var(--ink-soft);margin-bottom:8px}
  .dpe{
    display:inline-block;font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:5px;
    background:var(--ink);color:var(--paper);vertical-align:1px;
  }
  .dpe.good{background:var(--plum)}
  .dpe.bad{background:var(--terra-deep)}
  .badges{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
  .badge{font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:5px;background:var(--ok-bg);color:var(--plum)}
  .badge.warn{background:var(--terra-soft);color:var(--terra-deep)}
  .why{list-style:none;border-top:1px dashed var(--line);padding-top:9px}
  .why li{font-size:.78rem;color:var(--ink-soft);padding-left:15px;position:relative;margin-bottom:3px}
  .why li::before{content:'✓';position:absolute;left:0;color:var(--terra);font-weight:700}
  .why li:first-child{color:var(--ink);font-weight:500}

  /* Squelettes de chargement */
  .sk{height:250px;border-radius:var(--radius);border:1px solid var(--line);overflow:hidden;position:relative;background:var(--card)}
  .sk::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(100deg,transparent 30%,rgba(233,225,212,.6) 50%,transparent 70%);
    animation:shimmer 1.1s infinite;
  }
  @keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

  /* Suggestions d'assouplissement */
  .widen{margin-top:16px;padding:16px;border:1.5px dashed var(--terra);border-radius:var(--radius);background:var(--terra-soft)}
  .widen p{font-size:.85rem;font-weight:600;color:var(--terra-deep);margin-bottom:10px}
  .widen button{
    display:inline-block;margin:0 8px 8px 0;border:1px solid var(--terra);background:var(--card);
    color:var(--terra-deep);border-radius:99px;padding:7px 14px;font-size:.82rem;font-weight:600;transition:background .2s,color .2s;
  }
  .widen button:hover{background:var(--terra);color:#fff}
  .empty{padding:26px 4px;color:var(--ink-soft);font-size:.9rem}

  /* Conversation — tiroir bas (mobile-first) */
  #convo{
    position:fixed;bottom:0;left:0;right:0;z-index:10;background:var(--card);
    border-top:1.5px solid var(--line);border-radius:18px 18px 0 0;box-shadow:0 -8px 30px rgba(40,32,58,.08);
  }
  .drawer-head{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;padding:10px 18px 4px;color:var(--ink-soft);font-size:.78rem;font-weight:600}
  .drawer-head .chev{transition:transform .25s}
  #convo.open .chev{transform:rotate(180deg)}
  .msgs{
    display:none;max-height:34svh;overflow-y:auto;padding:6px 16px 4px;
    scroll-behavior:smooth;
  }
  #convo.open .msgs{display:block}
  .msg{max-width:88%;padding:8px 13px;border-radius:14px;font-size:.86rem;margin-bottom:8px;animation:pop .18s ease}
  .msg.user{background:var(--ink);color:var(--paper);margin-left:auto;border-bottom-right-radius:4px}
  .msg.bot{background:var(--paper);border:1px solid var(--line);border-bottom-left-radius:4px}
  .convo-input{padding:10px 14px 14px}
  .convo-input .ask{max-width:none}
  .convo-input .ask input{font-size:.9rem}
  .convo-input .ask button{padding:9px 16px}

  /* Desktop : colonne gauche fixe, résultats à droite */
  @media(min-width:920px){
    #app{display:grid;grid-template-columns:360px 1fr;grid-template-rows:auto 1fr;height:100vh}
    #convo{
      position:static;display:flex;flex-direction:column;z-index:auto;
      border-radius:0;border-top:none;border-right:1.5px solid var(--line);box-shadow:none;
      grid-row:1/3;height:100vh;
    }
    .drawer-head{display:none}
    .msgs,#convo.open .msgs{display:block;flex:1;max-height:none;padding:16px}
    .convo-input{border-top:1px solid var(--line)}
    #main{overflow-y:auto;min-height:0}
    #results{padding:18px 26px 60px}
    .convo-brand{padding:16px 18px 6px}
  }
  .convo-brand{display:none}
  @media(min-width:920px){.convo-brand{display:block}}

  .foot{font-size:.72rem;color:var(--ink-soft);text-align:center;padding:20px;line-height:1.5}
  #home .foot{position:absolute;bottom:8px;left:0;right:0}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<!-- ============ Écran d'accueil ============ -->
<div id="home">
  <div class="brand">boussole<i>.</i></div>
  <h1>Décrivez le bien que vous cherchez, <em>les résultats arrivent</em>.</h1>
  <form class="ask" id="homeForm">
    <input type="text" id="homeInput" placeholder="Ex : maison 3 chambres avec jardin, max 300 000 €, autour de Lille" autocomplete="off" aria-label="Décrivez votre recherche">
    <button type="submit">Chercher</button>
  </form>
  <div class="hints" aria-label="Exemples de recherche">
    <button type="button">Maison 3 chambres avec jardin autour de 300k près de Lille</button>
    <button type="button">Appartement T2 dans le Vieux-Lille, budget 260 000 €</button>
    <button type="button">Maison de plain-pied avec jardin, max 250k</button>
  </div>
  <p class="foot">Prototype de démonstration — annonces fictives. Conçu par Florian Malara.</p>
</div>

<!-- ============ Vue scindée ============ -->
<div id="app" hidden>
  <aside id="convo" aria-label="Conversation">
    <div class="convo-brand brand">boussole<i>.</i></div>
    <button class="drawer-head" id="drawerToggle" type="button" aria-expanded="false">
      <span id="drawerLabel">Conversation</span><span class="chev">▲</span>
    </button>
    <div class="msgs" id="msgs" aria-live="polite"></div>
    <div class="convo-input">
      <form class="ask" id="convoForm">
        <input type="text" id="convoInput" placeholder="Affinez : « avec jardin obligatoire », « monte à 350k »…" autocomplete="off" aria-label="Affiner la recherche">
        <button type="submit">Affiner</button>
      </form>
    </div>
  </aside>
  <div class="topbar">
    <span class="brand">boussole<i>.</i></span>
    <span class="tag">Démo · Métropole lilloise</span>
  </div>
  <main id="main">
    <div id="results">
      <div class="chips" id="chips"></div>
      <div class="count" id="count"></div>
      <div class="cards" id="cards"></div>
      <div id="widen"></div>
      <p class="foot">Prototype de démonstration — annonces fictives. Conçu par Florian Malara.</p>
    </div>
  </main>
</div>

<script src="engine.js"></script>
<script src="adapter.js"></script>
<script>
(function(){
'use strict';
/* =========================================================
   Interface uniquement — la logique métier vit dans engine.js,
   les données arrivent via adapter.js (loadAnnonces).
   ========================================================= */
const E = ImmoEngine;
const $ = id => document.getElementById(id);
const fmt = E.fmt;

// Teintes de dégradé par secteur (bloc visuel sans photo) — présentation
const HUES = {'Vieux-Lille':258,'Vauban':232,'Wazemmes':16,'Fives':340,'Saint-Maurice':288,
  'La Madeleine':206,'Lambersart':30,'Marcq-en-Barœul':264,"Villeneuve-d'Ascq":192,'Seclin':46,'Armentières':354};

let crit = E.freshCriteria();
let ANNONCES = [];
const dataReady = loadAnnonces().then(a => { ANNONCES = a; });

/* ---- Puces de critères ---- */
function chipDefs(c){
  const chips = [];
  if(c.budget) chips.push({k:'budget', t:(c.budget.approx?'≈ ':'≤ ') + fmt(c.budget.v)});
  if(c.type) chips.push({k:'type', t:c.type === 'maison' ? 'Maison' : 'Appartement'});
  if(c.pieces) chips.push({k:'pieces', t:'≥ ' + c.pieces + ' pièces'});
  if(c.chambres) chips.push({k:'chambres', t:'≥ ' + c.chambres + ' ch.'});
  if(c.jardin) chips.push({k:'jardin', t:c.jardin === 'hard' ? 'Jardin obligatoire' : 'Jardin souhaité'});
  if(c.plainPied) chips.push({k:'plainPied', t:'Plain-pied'});
  c.lieux.forEach(l => chips.push({k:'lieu:' + l, t:l}));
  if(c.dist) chips.push({k:'dist', t:(c.dist.hard?'≤ ':'~') + c.dist.km + ' km de Lille'});
  if(c.neuf === true) chips.push({k:'neuf', t:'Neuf'});
  if(c.neuf === false) chips.push({k:'neuf', t:'Ancien'});
  if(c.travaux === false) chips.push({k:'travaux', t:'Sans travaux'});
  const vg = E.viagerMode(c);
  if(vg === 'exclude') chips.push({k:'viager', t:'Viager exclu'});
  if(vg === 'only') chips.push({k:'viager', t:'Viager uniquement'});
  return chips;
}

function removeChip(k){
  if(k === 'budget') crit.budget = null;
  else if(k === 'type') crit.type = null;
  else if(k === 'pieces') crit.pieces = null;
  else if(k === 'chambres') crit.chambres = null;
  else if(k === 'jardin') crit.jardin = null;
  else if(k === 'plainPied') crit.plainPied = false;
  else if(k === 'dist') crit.dist = null;
  else if(k === 'neuf') crit.neuf = null;
  else if(k === 'travaux') crit.travaux = null;
  else if(k === 'viager'){ if(crit.viagerOnly) crit.viagerOnly = false; else crit.allowViager = true; }
  else if(k.startsWith('lieu:')) crit.lieux = crit.lieux.filter(l => l !== k.slice(5));
  render(false); // retrait de puce = re-filtrage instantané
}

function renderChips(){
  const box = $('chips');
  box.textContent = '';
  chipDefs(crit).forEach(ch => {
    const el = document.createElement('span');
    el.className = 'chip';
    el.append(ch.t);
    const x = document.createElement('button');
    x.type = 'button'; x.textContent = '×'; x.setAttribute('aria-label', 'Retirer : ' + ch.t);
    x.addEventListener('click', () => removeChip(ch.k));
    el.appendChild(x);
    box.appendChild(el);
  });
}

/* ---- Cartes de résultats ---- */
function card(b, c){
  const el = document.createElement('article');
  el.className = 'bcard';
  const h = HUES[b.lieu] || 200;
  const vis = document.createElement('div');
  vis.className = 'visual';
  vis.style.background = 'linear-gradient(140deg, hsl(' + h + ' 36% 26%), hsl(' + (h+38) + ' 44% 50%))';
  vis.innerHTML = '<span>' + (b.type === 'maison' ? 'Maison' : 'Appartement') + '<small>' + b.lieu + (b.ville !== b.lieu ? ' · ' + b.ville : '') + '</small></span>';
  el.appendChild(vis);

  const body = document.createElement('div');
  body.className = 'bbody';
  const dpeCls = 'AB'.includes(b.dpe) ? ' good' : 'FG'.includes(b.dpe) ? ' bad' : '';
  const badges = [
    b.neuf ? '<span class="badge">Neuf</span>' : '',
    b.viager ? '<span class="badge warn">Viager occupé</span>' : '',
    b.travaux ? '<span class="badge warn">Travaux</span>' : ''
  ].join('');
  body.innerHTML =
    '<div class="bhead"><span class="btitle">' + (b.type === 'maison' ? 'Maison' : 'Appart.') + ' ' + b.pieces + ' p. — ' + b.lieu + '</span>' +
    '<span class="bprice">' + fmt(b.prix) + '</span></div>' +
    '<div class="bmeta">' + b.surf + ' m² · ' + b.ch + ' ch. · ' +
      (b.etages === 0 ? 'plain-pied' : b.etages + ' niv.') + ' · <span class="dpe' + dpeCls + '">DPE ' + b.dpe + '</span>' +
      (b.jardin ? ' · jardin ' + b.jardin + ' m²' : '') + '</div>' +
    (badges ? '<div class="badges">' + badges + '</div>' : '') +
    '<ul class="why">' + E.buildReasons(b, c).map(r => '<li>' + r + '</li>').join('') + '</ul>';
  el.appendChild(body);
  return el;
}

function renderResults(list){
  const cards = $('cards');
  cards.textContent = '';
  list.forEach((b, i) => {
    const el = card(b, crit);
    el.style.animationDelay = Math.min(i * 40, 240) + 'ms';
    cards.appendChild(el);
  });
  $('count').innerHTML = list.length
    ? '<b>' + list.length + ' bien' + (list.length>1?'s':'') + '</b> · triés par pertinence'
    : 'Aucun bien ne correspond à tous vos critères.';

  const widen = $('widen');
  widen.textContent = '';
  if(list.length < 3){
    const sugg = E.suggestRelaxations(ANNONCES, crit, list.length);
    if(sugg.length){
      const box = document.createElement('div');
      box.className = 'widen';
      box.innerHTML = '<p>Peu de résultats — élargir un critère ?</p>';
      sugg.forEach(sg => {
        const btn = document.createElement('button');
        btn.type = 'button'; btn.textContent = sg.label;
        btn.addEventListener('click', () => {
          sg.mut(crit);
          const n = E.search(ANNONCES, crit).length;
          botSay('J’ai élargi (' + sg.label.split(' : ')[0].toLowerCase() + ') — ' + n + ' bien' + (n>1?'s':'') + '.');
          render(false);
        });
        box.appendChild(btn);
      });
      widen.appendChild(box);
    } else if(!list.length){
      widen.innerHTML = '<p class="empty">Essayez de retirer une puce ci-dessus pour élargir la recherche.</p>';
    }
  }
}

// skeleton=true : délai artificiel de 400 ms avec squelettes (réalisme)
function render(skeleton){
  renderChips();
  if(skeleton){
    const cards = $('cards');
    cards.textContent = '';
    $('count').textContent = 'Recherche…';
    $('widen').textContent = '';
    for(let i = 0; i < 6; i++){ const sk = document.createElement('div'); sk.className = 'sk'; cards.appendChild(sk); }
    setTimeout(() => renderResults(E.search(ANNONCES, crit)), 400);
  } else {
    renderResults(E.search(ANNONCES, crit));
  }
}

/* ---- Conversation & événements ---- */
function say(cls, text){
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text; // textContent : le texte utilisateur n'est jamais interprété
  $('msgs').appendChild(el);
  $('msgs').scrollTop = $('msgs').scrollHeight;
  $('drawerLabel').textContent = 'Conversation (' + $('msgs').children.length + ')';
}
const botSay = t => say('bot', t);

// L'assistant répond UNE phrase courte, jamais plus
function reply(got, n){
  const biens = n + ' bien' + (n>1?'s':'');
  if(!got.length) return 'Je n’ai pas saisi de nouveau critère — précisez budget, secteur, chambres ou jardin.';
  if(n === 0) return 'Compris, ' + got.join(', ') + ' — plus aucun bien, voyez les élargissements proposés.';
  return 'Compris, ' + got.join(', ') + ' — il reste ' + biens + '.';
}

function submit(text){
  text = text.trim();
  if(!text) return;
  dataReady.then(() => {
    const first = $('app').hidden;
    if(first){
      $('home').hidden = true;
      $('app').hidden = false;
    }
    say('user', text);
    const got = E.parseQuery(text, crit);
    render(true); // squelettes 400 ms puis résultats
    setTimeout(() => {
      const n = E.search(ANNONCES, crit).length;
      botSay(first ? 'Voici ' + n + ' bien' + (n>1?'s':'') + ' correspondant à votre recherche.' : reply(got, n));
    }, 420);
    $('convoInput').focus();
  });
}

$('homeForm').addEventListener('submit', e => { e.preventDefault(); submit($('homeInput').value); });
$('convoForm').addEventListener('submit', e => { e.preventDefault(); submit($('convoInput').value); $('convoInput').value = ''; });
document.querySelectorAll('.hints button').forEach(b =>
  b.addEventListener('click', () => { $('homeInput').value = b.textContent; submit(b.textContent); }));

// Tiroir mobile
$('drawerToggle').addEventListener('click', () => {
  const open = $('convo').classList.toggle('open');
  $('drawerToggle').setAttribute('aria-expanded', open);
});

})();
</script>
</body>
</html>
